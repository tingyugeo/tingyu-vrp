<body>

<canvas id="tyml-bg-canvas"></canvas>
<div id="app"></div>
<div class="scene-indicator" id="sceneLabel">❄️ WINTER · AURORA</div>

<script>
// ==================== 安全层：反调试 + 环境检测 ====================
(function() {
    let devtools = false;
    const element = new Image();
    Object.defineProperty(element, 'id', { get: function() { devtools = true; } });
    setInterval(() => {
        devtools = false;
        console.log(element);
        if (devtools) {
            document.body.innerHTML = "<div style='padding:100px; text-align:center;'><h3>⚠️ Structural Tension Lost</h3><p>Please close DevTools to resume algorithm.</p></div>";
        }
    }, 2000);
})();

// ==================== SCA O(N) 核心引擎 ====================
const _0xTY = (function() {
    let _tension = 0.5;
    const _constants = { _2pi: 6.283185, _c: 8, _stable: 4 };
    
    function parseCSV(text) {
        const lines = text.trim().split(/\r?\n/);
        const delimiter = lines[0].includes(";") ? ";" : ",";
        const data = [];
        for(let i = 1; i < lines.length; i++) {
            const cols = lines[i].split(delimiter);
            if(cols.length >= 3) {
                data.push({ x: Number(cols[2]), y: Number(cols[1]), service: 5/60 });
            }
        }
        return data;
    }
    
    function dist(a,b) { const dx = a.x - b.x, dy = a.y - b.y; return Math.sqrt(dx*dx + dy*dy) * 111; }
    
    function radius(pts) {
        let m = 0;
        for(let i = 0; i < pts.length; i++)
            for(let j = i + 1; j < pts.length; j++)
                m = Math.max(m, dist(pts[i], pts[j]));
        return m / 2;
    }
    
    function partition(pts, K) {
        let cx = 0, cy = 0;
        pts.forEach(p => { cx += p.x; cy += p.y; });
        cx /= pts.length; cy /= pts.length;
        let sorted = pts.map(p => ({ ...p, ang: Math.atan2(p.y - cy, p.x - cx) })).sort((a,b) => a.ang - b.ang);
        let zones = Array.from({ length: K }, () => []);
        sorted.forEach((p, i) => { zones[Math.floor(i * K / pts.length)].push(p); });
        return zones;
    }
    
    function computeAnalysis(data) {
        if(_tension < 0.1) return null;
        const start = performance.now();
        const n = data.length;
        const R = radius(data);
        const speed = 25;
        const serviceSum = data.reduce((s, p) => s + p.service, 0);
        const travel = n * (0.8 * R / speed);
        const work = serviceSum + travel;
        const K = Math.max(1, Math.ceil(work / 8));
        const zones = partition(data, K);
        const density = n / (Math.PI * R * R);
        const end = performance.now();
        return { n, zones, K, work, density, time: (end - start).toFixed(2), tension: _tension.toFixed(2) };
    }
    
    function drawAnalysis(points, zones) {
        const canvas = document.getElementById("analysisCanvas");
        if(!canvas) return;
        const ctx = canvas.getContext("2d");
        canvas.width = canvas.clientWidth;
        canvas.height = 140;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const colors = ["#00ffcc", "#00aaff", "#ffaa44", "#ff66cc", "#66ff66", "#ff4444"];
        const xs = points.map(p => p.x), ys = points.map(p => p.y);
        const minX = Math.min(...xs), maxX = Math.max(...xs), minY = Math.min(...ys), maxY = Math.max(...ys);
        function sx(x) { return (x - minX) / (maxX - minX) * canvas.width; }
        function sy(y) { return (y - minY) / (maxY - minY) * canvas.height; }
        zones.forEach((z, i) => {
            ctx.fillStyle = colors[i % colors.length];
            z.forEach(p => {
                ctx.beginPath();
                ctx.arc(sx(p.x), sy(p.y), 3, 0, Math.PI * 2);
                ctx.fill();
            });
        });
    }
    
    return {
        sync: (v) => { _tension = v; },
        parseCSV: parseCSV,
        computeAnalysis: computeAnalysis,
        drawAnalysis: drawAnalysis
    };
})();

// ==================== 四季背景引擎 ====================
(function() {
    const canvas = document.getElementById('tyml-bg-canvas');
    const ctx = canvas.getContext('2d');
    let width, height, time = 0, season = 0, lastSwitch = 0, particles = [];
    const SEASON_DURATION = 30000;
    const seasons = [
        { name: '❄️ WINTER · AURORA', bg: '#03070f', p: [150, 200, 255], speedY: 0.8 },
        { name: '🌸 SPRING · GOLDEN HAZE', bg: '#2a2418', p: [255, 200, 150], speedY: 0.5, speedX: 0.3 },
        { name: '🌅 SUMMER · SUNSET GLOW', bg: '#251a1c', p: [255, 140, 80], speedY: 0.4 },
        { name: '🍂 AUTUMN · HARVEST GLOW', bg: '#2a1e12', p: [220, 150, 100], speedY: 0.6, speedX: 0.4 }
    ];
    
    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        initParticles();
    }
    
    function initParticles() {
        const count = Math.min(80, Math.floor(width * height / 15000));
        particles = [];
        for(let i = 0; i < count; i++) {
            particles.push({
                x: Math.random() * width,
                y: Math.random() * height,
                size: 1 + Math.random() * 3,
                speedY: 0.2 + Math.random() * seasons[season].speedY,
                speedX: seasons[season].speedX ? (Math.random() - 0.5) * seasons[season].speedX : 0,
                opacity: 0.3 + Math.random() * 0.5
            });
        }
    }
    
    function draw() {
        if(!ctx) return;
        const now = performance.now();
        if(!lastSwitch) lastSwitch = now;
        if(now - lastSwitch > SEASON_DURATION) {
            season = (season + 1) % 4;
            lastSwitch = now;
            initParticles();
            const label = document.getElementById('sceneLabel');
            if(label) label.innerHTML = seasons[season].name;
            document.body.style.backgroundColor = seasons[season].bg;
            _0xTY.sync(0.5 + Math.sin(season) * 0.2);
        }
        
        const Γ = Math.sin(time * 0.5) * 0.3 + 0.5;
        const grad = ctx.createLinearGradient(0, 0, 0, height);
        grad.addColorStop(0, `rgb(${5 + Γ * 15}, ${10 + Γ * 30}, ${30 + Γ * 60})`);
        grad.addColorStop(0.5, `rgb(${20 + Γ * 30}, ${25 + Γ * 40}, ${45 + Γ * 50})`);
        grad.addColorStop(1, seasons[season].bg);
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, width, height);
        
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.beginPath();
        ctx.arc(width * 0.7 + Math.sin(time) * 30, height * 0.2 + Math.cos(time * 0.7) * 20, 200 + Γ * 100, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${seasons[season].p.join(',')}, ${0.05 + Γ * 0.1})`;
        ctx.fill();
        ctx.restore();
        
        particles.forEach(p => {
            p.y += p.speedY * (0.5 + Γ);
            if(p.y > height) p.y = -20;

function render() {
    const app = document.getElementById("app");
    if(!app) return;
    app.innerHTML = pages[currentRoute] || pages.home;
    bindEvents();
    setTimeout(() => { if(currentRoute === "home") runTerminal(); }, 200);
}

function setRoute(route) {
    currentRoute = route;
    render();
}

function bindEvents() {
    document.querySelectorAll('[data-nav]').forEach(el => {
        el.onclick = (e) => {
            e.preventDefault();
            const target = el.getAttribute('data-nav');
            if(target && pages[target]) setRoute(target);
            else if(target === 'home') setRoute('home');
        };
    });
    const ctaHowBtn = document.getElementById('ctaHowBtn');
    if(ctaHowBtn) ctaHowBtn.onclick = () => setRoute('howto');
    const downloadBtn = document.getElementById('downloadTemplateBtn');
    if(downloadBtn) {
        downloadBtn.onclick = () => {
            const csv = "id,lat,lon,demand,service_time,tw_start,tw_end\n1,40.7128,-74.0060,1,5,0,1000\n2,40.7135,-74.0050,1,5,0,1000\n3,40.7142,-74.0042,2,10,0,1000\n4,40.7150,-74.0035,1,5,0,1000";
            const blob = new Blob([csv], {type: "text/csv"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "tingyu_template.csv";
            a.click();
            URL.revokeObjectURL(a.href);
        };
    }
}

// Γ 动态效果
let gammaT = 0;
function updateGammaEffects() {
    gammaT += 0.016;
    const title = document.getElementById('gammaTitle');
    if(title) {
        const Φ = Math.sin(gammaT * 2);
        title.style.transform = `scale(${1 + Φ * 0.05})`;
    }
    document.querySelectorAll('.glass-card, .stat-card, .stage, .analysis-demo').forEach((c, i) => {
        c.style.transform = `translateY(${Math.sin(gammaT + i) * 5}px)`;
    });
    requestAnimationFrame(updateGammaEffects);
}

// 启动
render();
updateGammaEffects();
</script>
